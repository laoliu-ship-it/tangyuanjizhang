services:
  fandianjizhang-server:
    image: fandianjizhang-server:latest
    container_name: fandianjizhang-server
    restart: unless-stopped
    ports:
      - "8090:8080"
    environment:
      DB_DSN: root:allgood@tcp(host.docker.internal:3306)/fandian?charset=utf8mb4&parseTime=True
      JWT_SECRET: ${JWT_SECRET:-please_change_this_secret}
      OCR_ENGINE: rapidocr
      OCR_RAPIDOCR_URL: http://fandianjizhang-ocr:8001/ocr
      OCR_AI_MODE: "false"
      UPLOAD_PATH: /uploads
      SERVER_PORT: "8080"
    volumes:
      - "/${TRIM_APPDEST_VOL}/@appshare/fandianjizhang/uploads:/uploads"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  fandianjizhang-ocr:
    image: fandian-ocr:latest
    container_name: fandianjizhang-ocr
    restart: unless-stopped
